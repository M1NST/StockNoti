name: StockNoti Daily Report

on:
  schedule:
    # 08:30 Asia/Bangkok = 01:30 UTC
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      STOCKNOTI_CONFIG: config/watchlist.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate configuration
        run: python -c "from stocknoti.config import load_config; c = load_config(); assert c.watchlist; print(f'Loaded {len(c.watchlist)} symbols')"

      - name: Check Discord webhook secret
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing DISCORD_WEBHOOK_URL repository secret"
            exit 1
          fi

      - name: Send Discord daily report
        run: python -m stocknoti daily --send-discord
